name: Dashboard Refresh
on:
  schedule:
    - cron: '*/5 3-10 * * 1-5' # Every 5 min during market
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: pip install yfinance pandas pytz
      - run: python master_dashboard.py
      - name: Commit
        run: |
          git config --global user.name "MarketBot"
          git add market_data.json
          git commit -m "Sync" || exit 0
          git push
