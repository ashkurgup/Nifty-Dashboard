<!DOCTYPE html>
<html>
<head>
    <title>Nifty Live Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .val { font-size: 1.5em; font-weight: bold; color: #00ff88; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2>Nifty 50 Engine <span id="time" style="font-size: 0.5em; color: #666;">--</span></h2>

    <div class="grid">
        <div class="card"><div class="label">LTP</div><div id="ltp" class="val">--</div></div>
        <div class="card"><div class="label">India VIX</div><div id="vix" class="val">--</div></div>
        <div class="card"><div class="label">PCR</div><div id="pcr" class="val">--</div></div>
    </div>

    <h3>Reference Levels</h3>
    <div class="grid">
        <div class="card"><div class="label">PDH</div><div id="pdh" class="val">--</div></div>
        <div class="card"><div class="label">PDL</div><div id="pdl" class="val">--</div></div>
        <div class="card"><div class="label">PDC</div><div id="pdc" class="val">--</div></div>
    </div>

    <h3>Market Status</h3>
    <div class="grid">
        <div class="card"><div class="label">vs PDH</div><div id="s_pdh" class="val">--</div></div>
        <div class="card"><div class="label">Liquidity</div><div id="s_liq" class="val">--</div></div>
        <div class="card"><div class="label">Gap (PDC)</div><div id="s_gap" class="val">--</div></div>
    </div>

    <h3>Structure (9:30-11:00)</h3>
    <div class="grid">
        <div class="card"><div class="label">Big Body</div><div id="big" class="val">--</div></div>
        <div class="card"><div class="label">Follow Through</div><div id="same" class="val">--</div></div>
    </div>

    <script>
        // START_DATA
        const data = {};
        // END_DATA

        function render() {
            if(!data.current) return;
            
            document.getElementById('time').innerText = data.updateTime;
            document.getElementById('ltp').innerText = data.current.ltp;
            document.getElementById('vix').innerText = data.current.vix;
            document.getElementById('pcr').innerText = data.current.pcr;
            
            document.getElementById('pdh').innerText = data.reference.pdh;
            document.getElementById('pdl').innerText = data.reference.pdl;
            document.getElementById('pdc').innerText = data.reference.pdc;
            
            document.getElementById('s_pdh').innerText = data.status.pdh;
            document.getElementById('s_liq').innerText = data.status.liq;
            document.getElementById('s_gap').innerText = data.status.gap11;
            
            document.getElementById('big').innerText = data.structure.big;
            document.getElementById('same').innerText = data.structure.same;
        }
        
        render();
    </script>
</body>
</html>
